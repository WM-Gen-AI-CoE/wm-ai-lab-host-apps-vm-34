server {
    listen 80;
    listen [::]:80;

    server_name _;

    client_max_body_size 32m;

    location = / {
        return 302 https://agents.westmonroe.ai/wm-dataai-software/;
    }

    location = /wm-dataai-software {
        return 308 /wm-dataai-software/;
    }

    location = /wm-dataai-software/api {
        return 308 /wm-dataai-software/api/;
    }

    location ^~ /wm-dataai-software/api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /wm-dataai-software/api;
        proxy_pass http://wm-dataai-software:3000/api/;
    }

    location ^~ /wm-dataai-software/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /wm-dataai-software;
        proxy_pass http://wm-dataai-software:3000/;
    }

    location / {
        return 404;
    }
}
