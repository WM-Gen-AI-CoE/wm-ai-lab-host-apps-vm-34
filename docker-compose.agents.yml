services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - wm-dataai-software
    ports:
      - "80:80"
    volumes:
      - ./data/agents/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro

  wm-dataai-software:
    build:
      context: ./apps/wm-dataai-software
      dockerfile: Dockerfile
    environment:
      APP_HOST: https://agents.westmonroe.ai
      APP_FRONTEND_PATH: /wm-dataai-software
      APP_BACKEND_PATH: /wm-dataai-software/api
      PORT: "3000"
      DISABLE_SITE_PASSWORD: "true"
      SITE_PASSWORD: replace-if-password-gate-is-enabled
      AUTH_SECRET: replace-with-random-string-if-password-gate-is-enabled
