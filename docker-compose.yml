services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - wm-dataai-software
    ports:
      - "3034:80"
    volumes:
      - ./data/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro

  wm-dataai-software:
    build:
      context: ./apps/wm-dataai-software
      dockerfile: Dockerfile
    env_file:
      - ./apps/wm-dataai-software/.env.local-dev
